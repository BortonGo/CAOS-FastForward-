variables:
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive
  REGISTRY: registry.gitlab.qcourse.ru/caos-fastforward/public

grade:
  image: $REGISTRY/testenv-image:latest
  rules:
    - if: $CI_PROJECT_NAME =~ /^public-20\d\d/
      when: never
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /contributing/ || $CI_COMMIT_BRANCH =~ /contributing/
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never
  script:
    - . /opt/checker/venv/bin/activate
    - python3 -m checker grade . /opt/caos
  timeout: 10 minutes
