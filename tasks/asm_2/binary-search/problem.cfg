[problem]

enable_language = gas
lang_compiler_env = "gas=EJUDGE_ADD_FLAGS=-DFUNC=sort_by_abs ${problem.problem_dir}/main.c ${problem.problem_dir}/../../common-files/wrap_x86_64.S"

standard_checker = "cmp_int_seq"

style_checker_cmd = "../../../test_style_checker.py"
style_checker_env = "EJ_BAN_BY_REGEX_REQ_TEXT=\\.text"
style_checker_env = "EJ_BAN_BY_REGEX_PREPROCESS=1"
style_checker_env = "EJ_BAN_BY_REGEX_IGNORE_CASE=1"
style_checker_env = "EJ_BAN_BY_REGEX_BAN_EXIT=call exit"
