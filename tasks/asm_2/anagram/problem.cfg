[problem]

enable_language = gas

standard_checker = "cmp_file"

style_checker_cmd = "../../../test_style_checker.py"
style_checker_env = "EJ_BAN_BY_REGEX_REQ_TEXT=\\.text"
style_checker_env = "EJ_BAN_BY_REGEX_REQ_CALL_PUTS=\\bcall getchar\\b"
style_checker_env = "EJ_BAN_BY_REGEX_REQ_PROLOG=\\b(pushq? %?rbp movq? %?rsp, %?rbp|pushq? rbp movq? rbp, rsp|pushq? rbp movq? rsp, rbp|enter \\$?\\d+, \\$?\\d+)\\b"
style_checker_env = "EJ_BAN_BY_REGEX_REQ_EPILOG=\\b(movq? %?rbp, %?rsp popq? %?rbp|movq? rsp, rbp popq? rbp|movq? rbp, rsp popq? rbp|leave|leaq? -\\d+\\(%rbp\\), %rsp (popq? %r.. )+popq? %rbp)\\b"
style_checker_env = "EJ_BAN_BY_REGEX_PREPROCESS=1"
style_checker_env = "EJ_BAN_BY_REGEX_IGNORE_CASE=1"
style_checker_env = "EJ_BAN_BY_REGEX_BAN_EXIT=call exit"
style_checker_env = "EJ_BAN_BY_REGEX_BAN_SORT=call \\w*sort\\w*"

